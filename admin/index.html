<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login | Aventrix Realty</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Cormorant+Garamond:wght@600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/admin.css">
</head>
<body class="admin-body">

<div class="admin-login-wrap">
    <div class="admin-login-card">
        <div class="admin-login-logo">
            <span class="main">AVENTRIX</span>
            <span class="sub">ADMIN PANEL</span>
        </div>

        <div class="admin-error" id="adminLoginError">Incorrect email or password.</div>

        <form id="adminLoginForm">
            <div class="admin-field">
                <label for="adminEmail">Email</label>
                <input type="email" id="adminEmail" required autocomplete="username">
            </div>
            <div class="admin-field">
                <label for="adminPassword">Password</label>
                <input type="password" id="adminPassword" required autocomplete="current-password">
            </div>
            <button type="submit" class="admin-btn">Sign In</button>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase-client.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
